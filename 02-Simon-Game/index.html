<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Simon Says Game </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2> Simon Game</h2>

    <h3> Press Any Key To Start </h3>

    <div class="upper">
        <div class="red"></div>
        <div class="green"></div>
    </div>

    <div class="lower">
        <div class="yellow"></div>
        <div class="pink"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
